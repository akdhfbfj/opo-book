<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오포초 디지털 북로드 V5 📚</title>
    <!-- 디자인 라이브러리 (Tailwind CSS) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 아이콘 라이브러리 (Font Awesome) -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- 구글 폰트 -->
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Nanum+Gothic:wght@400;700&display=swap" rel="stylesheet">
    <!-- React 및 Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { 
            font-family: 'Nanum Gothic', sans-serif; 
            background: linear-gradient(135deg, #fff9db 0%, #e3f2fd 100%);
            min-height: 100vh;
            color: #334155;
        }
        .font-gaegu { font-family: 'Gaegu', cursive; }
        .bubble-card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 2rem;
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.05);
            border: 4px solid white;
        }
        /* 하단바 색상 강화 */
        .nav-item {
            color: #94a3b8; /* 기본 흐린 회색 */
            transition: all 0.3s;
        }
        .nav-item.active {
            color: #4338ca; /* 진한 인디고 */
            transform: scale(1.1) translateY(-4px);
        }
        .nav-text {
            color: #64748b; /* 기본 텍스트 */
            font-size: 11px;
            font-weight: 700;
        }
        .nav-item.active .nav-text {
            color: #4338ca;
        }

        .calendar-day {
            aspect-ratio: 1 / 1.2;
            border-radius: 0.75rem;
            background: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 4px;
            font-size: 10px;
            border: 1px solid #f1f5f9;
        }
        .calendar-day.today { border: 2px solid #6366f1; background: #eef2ff; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .animate-pop { animation: pop 0.3s ease-out; }
        @keyframes pop {
            0% { transform: scale(0.95); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, doc, updateDoc, arrayUnion, arrayRemove, getDoc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // Firebase 설정
        const firebaseConfig = {
            apiKey: "AIzaSyDOEDyzO5kYY-OCmqJZrUU1rfenP8Kz8tM",
            authDomain: "opoproject-c291b.firebaseapp.com",
            projectId: "opoproject-c291b",
            storageBucket: "opoproject-c291b.firebasestorage.app",
            messagingSenderId: "792551343830",
            appId: "1:792551343830:web:b3e10df0bf4b92c4c4eb77",
            measurementId: "G-K1TD0BB954"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = "opo-digital-bookroad-v5";

        const { useState, useEffect, useRef } = React;

        const KDC_LABELS = {
            "000": "📂 000 총류", 
            "100": "🧠 100 철학", 
            "200": "🙏 200 종교", 
            "300": "🤝 300 사회과학", 
            "400": "🌿 400 자연과학",
            "500": "⚙️ 500 기술과학", 
            "600": "🎨 600 예술", 
            "700": "🗣️ 700 언어", 
            "800": "📚 800 문학", 
            "900": "🗺️ 900 역사"
        };

        function App() {
            const [user, setUser] = useState(null); 
            const [appUser, setAppUser] = useState(null); 
            const [isLoginView, setIsLoginView] = useState(true);
            
            // 입력 필드들
            const [loginId, setLoginId] = useState("");
            const [loginPw, setLoginPw] = useState("");
            const [loginPwConfirm, setLoginPwConfirm] = useState("");
            const [signupName, setSignupName] = useState("");
            const [signupNo, setSignupNo] = useState("");

            const [activeTab, setActiveTab] = useState('feed');
            const [posts, setPosts] = useState([]);
            const [secrets, setSecrets] = useState([]);
            const [allSecrets, setAllSecrets] = useState([]); 
            const [alert, setAlert] = useState({ show: false, msg: '', icon: '' });
            const [showComments, setShowComments] = useState(null);
            const [showLikes, setShowLikes] = useState(null); // 좋아요 명단 모달
            const [commentInput, setCommentInput] = useState("");
            const [selectedLifeImg, setSelectedLifeImg] = useState(null);
            const [replyTarget, setReplyTarget] = useState(null); // 관리자 답장 대상

            useEffect(() => {
                const initAuth = async () => { await signInAnonymously(auth); };
                initAuth();
                const unsubAuth = onAuthStateChanged(auth, async (userData) => {
                    if (userData) {
                        setUser(userData);
                        const savedId = localStorage.getItem('opo_login_id');
                        if (savedId) fetchAppUser(savedId);
                    }
                });
                return () => unsubAuth();
            }, []);

            const fetchAppUser = async (id) => {
                const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'users', id);
                const userSnap = await getDoc(userRef);
                if (userSnap.exists()) setAppUser(userSnap.data());
                else localStorage.removeItem('opo_login_id');
            };

            useEffect(() => {
                if (!appUser) return;
                const postsColl = collection(db, 'artifacts', appId, 'public', 'data', 'posts');
                const unsubPosts = onSnapshot(postsColl, (snapshot) => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setPosts(data.sort((a, b) => b.timestamp - a.timestamp));
                });
                const secretsColl = collection(db, 'artifacts', appId, 'users', appUser.id, 'secrets');
                const unsubSecrets = onSnapshot(secretsColl, (snapshot) => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setSecrets(data.sort((a, b) => a.timestamp - b.timestamp));
                });
                if (appUser.role === 'admin') {
                    const allSecretsColl = collection(db, 'artifacts', appId, 'public', 'data', 'all_secrets');
                    onSnapshot(allSecretsColl, (snapshot) => {
                        const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setAllSecrets(data.sort((a, b) => b.timestamp - a.timestamp));
                    });
                }
                return () => { unsubPosts(); unsubSecrets(); };
            }, [appUser]);

            const showAlert = (msg, icon) => setAlert({ show: true, msg, icon: icon || '🌟' });

            const handleSignup = async () => {
                if (!loginId || !loginPw || !signupName || !signupNo) return showAlert("빈칸을 모두 채워주세요!", "✍️");
                if (loginPw !== loginPwConfirm) return showAlert("비밀번호가 서로 달라요!", "🔐");
                
                const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'users', loginId);
                const userSnap = await getDoc(userRef);
                if (userSnap.exists()) return showAlert("이미 있는 아이디예요!", "🚫");

                const newUser = {
                    id: loginId,
                    pw: loginPw,
                    name: signupName,
                    no: signupNo,
                    role: loginId.includes('admin') ? 'admin' : 'student',
                    profileImg: null,
                    createdAt: Date.now()
                };
                await setDoc(userRef, newUser);
                setAppUser(newUser);
                localStorage.setItem('opo_login_id', loginId);
                showAlert(`${signupName} 작가님, 환영해요!`, "🎈");
            };

            const handleLogin = async () => {
                if (!loginId || !loginPw) return showAlert("아이디와 비밀번호를 써주세요!", "👀");
                const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'users', loginId);
                const userSnap = await getDoc(userRef);
                if (userSnap.exists()) {
                    const userData = userSnap.data();
                    if (userData.pw === loginPw) {
                        setAppUser(userData);
                        localStorage.setItem('opo_login_id', loginId);
                        showAlert(`${userData.name}님 반가워요!`, "🎈");
                    } else showAlert("비밀번호가 틀렸어요!", "🔒");
                } else showAlert("가입되지 않은 아이디예요!", "❓");
            };

            const logout = () => {
                setAppUser(null);
                localStorage.removeItem('opo_login_id');
                setLoginId(""); setLoginPw(""); setSignupName(""); setSignupNo(""); setIsLoginView(true);
            };

            const savePost = async (type) => {
                if (!appUser) return;
                const content = document.getElementById(type === 'book' ? 'book-content' : 'life-content').value;
                if (!content) return showAlert('내용을 적어주세요!', '✍️');

                const newPost = {
                    type,
                    writer: appUser.name,
                    writerNo: appUser.no,
                    writerId: appUser.id,
                    writerRole: appUser.role,
                    writerImg: appUser.profileImg,
                    content,
                    timestamp: Date.now(),
                    likes: [], // [{id, name}]
                    comments: [],
                    date: new Date().toISOString()
                };

                if (type === 'book') {
                    newPost.title = document.getElementById('book-title').value;
                    newPost.author = document.getElementById('book-author').value || '작자미상';
                    newPost.category = document.getElementById('book-category').value;
                } else if (selectedLifeImg) newPost.imageUrl = selectedLifeImg;

                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'posts'), newPost);
                setActiveTab('feed');
                showAlert('저장되었습니다!', '✨');
                if(type === 'book') {
                    document.getElementById('book-title').value = '';
                    document.getElementById('book-content').value = '';
                    document.getElementById('book-author').value = '';
                } else {
                    document.getElementById('life-content').value = '';
                    setSelectedLifeImg(null);
                }
            };

            const deletePost = async (postId) => {
                if (!confirm("정말 이 글을 삭제할까요?")) return;
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'posts', postId));
                showAlert("글이 삭제되었습니다.", "🗑️");
            };

            const toggleLike = async (postId) => {
                const post = posts.find(p => p.id === postId);
                const myKey = { id: appUser.id, name: appUser.name };
                const postRef = doc(db, 'artifacts', appId, 'public', 'data', 'posts', postId);
                
                const existing = post.likes.find(l => l.id === appUser.id);
                if (existing) await updateDoc(postRef, { likes: arrayRemove(existing) });
                else await updateDoc(postRef, { likes: arrayUnion(myKey) });
            };

            const addComment = async () => {
                if (!commentInput) return;
                const postRef = doc(db, 'artifacts', appId, 'public', 'data', 'posts', showComments.id);
                await updateDoc(postRef, {
                    comments: arrayUnion({
                        writerId: appUser.id,
                        writer: appUser.name,
                        content: commentInput,
                        date: new Date().toISOString(),
                        timestamp: Date.now()
                    })
                });
                setCommentInput("");
            };

            const sendSecret = async () => {
                const content = document.getElementById('secret-content').value;
                if (!content) return;
                const secretData = {
                    studentId: appUser.id,
                    writer: appUser.name,
                    writerNo: appUser.no,
                    content,
                    timestamp: Date.now(),
                    date: new Date().toLocaleString(),
                    reply: null
                };
                await addDoc(collection(db, 'artifacts', appId, 'users', appUser.id, 'secrets'), secretData);
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'all_secrets'), secretData);
                document.getElementById('secret-content').value = '';
                showAlert('선생님께 전달되었습니다!', '💌');
            };

            const sendReply = async (s) => {
                const replyText = prompt(`${s.writer} 작가님에게 보낼 답장을 적어주세요:`);
                if (!replyText) return;
                
                // 학생의 개인 공간 메시지에 답장 추가 (전체 메시지는 관리만 하므로 학생 개인 공간에 업데이트)
                // 실제로는 all_secrets와 개인 secrets 모두 업데이트하는 것이 좋음
                // 여기서는 간략히 학생 개인 폴더 메시지를 찾아 업데이트
                const studentSecretRef = doc(db, 'artifacts', appId, 'users', s.studentId, 'secrets', s.id);
                await updateDoc(studentSecretRef, { reply: replyText });
                
                const adminSecretRef = doc(db, 'artifacts', appId, 'public', 'data', 'all_secrets', s.id);
                await updateDoc(adminSecretRef, { reply: replyText });

                showAlert("답장을 보냈습니다!", "✉️");
            };

            const handleProfileUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = async (event) => {
                        const imgData = event.target.result;
                        const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'users', appUser.id);
                        await updateDoc(userRef, { profileImg: imgData });
                        setAppUser({ ...appUser, profileImg: imgData });
                        showAlert("프로필 사진이 변경되었습니다!", "🖼️");
                    };
                    reader.readAsDataURL(file);
                }
            };

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => setSelectedLifeImg(event.target.result);
                    reader.readAsDataURL(file);
                }
            };

            const renderCalendar = () => {
                const now = new Date();
                const lastDate = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
                const firstDay = new Date(now.getFullYear(), now.getMonth(), 1).getDay();
                const myHistory = {};
                posts.filter(p => p.writerId === appUser.id && p.type === 'book').forEach(p => {
                    const d = new Date(p.timestamp).getDate();
                    myHistory[d] = (myHistory[d] || 0) + 1;
                });
                let days = [];
                for(let i=0; i<firstDay; i++) days.push(<div key={`empty-${i}`} className="p-2"></div>);
                for(let i=1; i<=lastDate; i++) {
                    const count = myHistory[i] || 0;
                    days.push(
                        <div key={i} className={`relative p-1 h-14 border rounded-xl flex flex-col items-center ${i === now.getDate() ? 'bg-indigo-50 border-indigo-200' : 'bg-slate-50 border-transparent'}`}>
                            <span className="text-[10px] font-bold text-slate-400">{i}</span>
                            <div className="flex flex-wrap justify-center gap-0.5 mt-1">
                                {count > 0 && (count <= 3 ? [...Array(count)].map((_,idx) => <i key={idx} className="fa-solid fa-book text-[8px] text-indigo-400"></i>) : <><i className="fa-solid fa-book text-[8px] text-indigo-400"></i><span className="text-[8px] font-bold text-indigo-600">3+</span></>)}
                            </div>
                        </div>
                    );
                }
                return days;
            };

            if (!appUser) {
                return (
                    <div className="fixed inset-0 bg-indigo-600 flex items-center justify-center p-6 text-white font-sans overflow-y-auto">
                        <div className="text-center w-full max-w-sm py-10 animate-pop">
                            <div className="bg-white/10 backdrop-blur-xl p-8 rounded-[3.5rem] border border-white/20 shadow-2xl">
                                <h1 className="text-4xl font-bold font-gaegu mb-2 text-yellow-300">오포초등학교</h1>
                                <h2 className="text-xl font-bold font-gaegu mb-8 text-indigo-100 italic">디지털 북로드 V5</h2>
                                <div className="space-y-3 text-gray-800">
                                    <input type="text" value={loginId} onChange={(e) => setLoginId(e.target.value)} placeholder="아이디" className="w-full p-4 rounded-2xl outline-none shadow-inner text-center font-bold" onKeyDown={(e)=>e.key==='Enter' && (isLoginView ? handleLogin() : null)} />
                                    <input type="password" value={loginPw} onChange={(e) => setLoginPw(e.target.value)} placeholder="비밀번호" className="w-full p-4 rounded-2xl outline-none shadow-inner text-center font-bold" onKeyDown={(e)=>e.key==='Enter' && (isLoginView ? handleLogin() : null)} />
                                    {!isLoginView && (
                                        <>
                                            <input type="password" value={loginPwConfirm} onChange={(e) => setLoginPwConfirm(e.target.value)} placeholder="비밀번호 확인" className="w-full p-4 rounded-2xl outline-none shadow-inner text-center font-bold" />
                                            <input type="text" value={signupName} onChange={(e) => setSignupName(e.target.value)} placeholder="이름 (예: 홍길동)" className="w-full p-4 rounded-2xl outline-none shadow-inner text-center font-bold" />
                                            <input type="number" value={signupNo} onChange={(e) => setSignupNo(e.target.value)} placeholder="출석 번호" className="w-full p-4 rounded-2xl outline-none shadow-inner text-center font-bold" onKeyDown={(e)=>e.key==='Enter' && handleSignup()} />
                                        </>
                                    )}
                                    <button onClick={isLoginView ? handleLogin : handleSignup} className="w-full bg-yellow-400 text-indigo-900 font-bold p-4 rounded-2xl text-xl active:scale-95 transition shadow-lg mt-2">
                                        {isLoginView ? "작가 로그인 🎒" : "작가 등록하기 ✨"}
                                    </button>
                                    <button onClick={() => setIsLoginView(!isLoginView)} className="text-white/70 text-sm font-bold underline mt-4 block mx-auto">
                                        {isLoginView ? "처음 왔나요? (회원가입)" : "아이디가 있나요? (로그인)"}
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-xl mx-auto p-4 font-sans pb-44 min-h-screen">
                    <header className="flex justify-between items-center mb-6 pt-4 px-2">
                        <div className="flex items-center gap-4">
                            <div className="w-14 h-14 rounded-2xl bg-white shadow-lg flex items-center justify-center text-indigo-200 text-2xl overflow-hidden border-2 border-white">
                                {appUser.profileImg ? <img src={appUser.profileImg} className="w-full h-full object-cover" /> : <i className="fa-solid fa-user"></i>}
                            </div>
                            <div>
                                <h2 className="text-2xl font-bold text-slate-800 font-gaegu leading-none mb-1"><span className="text-indigo-600">{appUser.name}</span> {appUser.role === 'admin' ? '선생님' : '작가님'}</h2>
                                <div className="flex items-center gap-2">
                                    <span className={`text-white text-[9px] px-2 py-0.5 rounded-full font-bold ${appUser.role === 'admin' ? 'bg-red-500' : 'bg-indigo-500'}`}>
                                        {appUser.role === 'admin' ? '관리자' : 'LV.1 새싹'}
                                    </span>
                                    {appUser.role !== 'admin' && <span className="text-[10px] text-slate-400 font-bold tracking-widest">{appUser.no}번</span>}
                                </div>
                            </div>
                        </div>
                        <button onClick={logout} className="text-slate-400 text-xs font-bold hover:text-red-500">로그아웃</button>
                    </header>

                    <div className="min-h-[60vh]">
                        {activeTab === 'feed' && (
                            <div className="space-y-6 animate-pop">
                                <h3 className="font-bold text-slate-800 text-xl font-gaegu ml-2">우리 반 타임라인 💬</h3>
                                {posts.length === 0 ? <div className="text-center py-20 text-slate-300 italic font-gaegu text-xl">아직 첫 글이 없어요.</div> : posts.map(post => {
                                    const isLiked = post.likes.some(l => l.id === appUser.id);
                                    const canDelete = appUser.id === post.writerId || appUser.role === 'admin';
                                    return (
                                        <div key={post.id} className="bg-white rounded-[2rem] p-6 shadow-sm border-4 border-white mb-4 relative">
                                            {canDelete && (
                                                <button onClick={() => deletePost(post.id)} className="absolute top-6 right-6 text-slate-200 hover:text-red-400 transition-colors">
                                                    <i className="fa-solid fa-trash-can"></i>
                                                </button>
                                            )}
                                            <div className="flex justify-between items-center mb-4">
                                                <div className="flex items-center gap-3">
                                                    <div className="w-10 h-10 rounded-xl bg-indigo-50 flex items-center justify-center text-indigo-200 overflow-hidden border">
                                                        {post.writerImg ? <img src={post.writerImg} className="w-full h-full object-cover" /> : <i className="fa-solid fa-user"></i>}
                                                    </div>
                                                    <div>
                                                        <h5 className="font-bold text-slate-800 font-gaegu text-lg leading-tight">{post.writer} {post.writerRole === 'admin' ? '선생님' : ''}</h5>
                                                        <p className="text-[9px] text-slate-300 font-bold tracking-tighter">
                                                            {post.writerRole === 'admin' ? '관리자' : `${post.writerNo}번 작가`}
                                                        </p>
                                                    </div>
                                                </div>
                                                <span className="text-[9px] font-bold bg-indigo-50 text-indigo-400 px-2 py-1 rounded-lg uppercase italic">
                                                    {post.type === 'book' ? KDC_LABELS[post.category]?.split(' ')[0] : 'DAILY'}
                                                </span>
                                            </div>
                                            {post.imageUrl && <img src={post.imageUrl} className="w-full rounded-2xl mb-4 border-2 border-slate-50 shadow-sm" alt="Post" />}
                                            {post.type === 'book' && <div className="bg-indigo-50/50 p-4 rounded-2xl mb-4 border-l-4 border-indigo-400 shadow-inner"><h4 className="font-bold text-slate-800 font-gaegu">📖 {post.title}</h4><p className="text-[10px] text-indigo-400">{post.author}</p></div>}
                                            <div className="text-sm text-slate-600 leading-relaxed mb-5 whitespace-pre-wrap px-1">{post.content}</div>
                                            <div className="flex items-center gap-3 pt-4 border-t border-slate-50">
                                                <div className="flex items-center">
                                                    <button onClick={() => toggleLike(post.id)} className={`px-4 py-2 rounded-full border transition-all ${isLiked ? 'text-pink-500 bg-pink-50 border-pink-100' : 'text-slate-400 bg-slate-50 border-transparent'}`}>
                                                        <i className={`fa-${isLiked ? 'solid' : 'regular'} fa-heart mr-1`}></i>{post.likes.length}
                                                    </button>
                                                    {post.likes.length > 0 && (
                                                        <button onClick={() => setShowLikes(post.likes)} className="ml-2 text-[10px] text-slate-300 font-bold underline">누가 눌렀나?</button>
                                                    )}
                                                </div>
                                                <button onClick={() => setShowComments(post)} className="px-4 py-2 rounded-full bg-slate-50 text-slate-400 hover:bg-slate-100">
                                                    <i className="fa-regular fa-comment mr-1"></i>{post.comments.length}
                                                </button>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        )}

                        {activeTab === 'write-book' && (
                            <div className="bg-white rounded-[2rem] p-8 shadow-lg border-4 border-white animate-pop">
                                <h3 className="text-3xl font-bold mb-6 text-slate-800 font-gaegu text-center underline decoration-indigo-100">📖 독서기록장</h3>
                                <div className="space-y-4">
                                    <select id="book-category" className="w-full p-4 bg-slate-50 rounded-2xl font-bold text-indigo-600 outline-none border-2 border-transparent focus:border-indigo-400">
                                        {Object.entries(KDC_LABELS).map(([k,v]) => <option key={k} value={k}>{v}</option>)}
                                    </select>
                                    <input id="book-title" placeholder="책 제목을 적어주세요" className="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none border-2 border-transparent focus:border-indigo-400 shadow-inner" />
                                    <input id="book-author" placeholder="저자(지은이)" className="w-full p-4 bg-slate-50 rounded-2xl outline-none" />
                                    <textarea id="book-content" placeholder="이 책을 읽고 내 생각이 어떻게 자라났나요?" className="w-full p-4 bg-slate-50 rounded-2xl h-48 outline-none resize-none leading-relaxed border-2 border-transparent focus:border-indigo-400 shadow-inner"></textarea>
                                    <button onClick={() => savePost('book')} className="w-full bg-indigo-600 text-white font-bold p-5 rounded-3xl text-xl shadow-xl active:scale-95 transition-all">공유하기 🚀</button>
                                </div>
                            </div>
                        )}

                        {activeTab === 'write-life' && (
                            <div className="bg-white rounded-[2rem] p-8 shadow-lg border-4 border-white animate-pop">
                                <h3 className="text-3xl font-bold mb-6 text-slate-800 font-gaegu text-center underline decoration-emerald-100">✨ 오늘의 조각</h3>
                                <div className="space-y-4">
                                    <textarea id="life-content" placeholder="오늘 있었던 재미있는 일을 자유롭게 기록해요." className="w-full p-4 bg-slate-50 rounded-2xl h-60 outline-none resize-none shadow-inner border-2 border-transparent focus:border-emerald-400 leading-relaxed"></textarea>
                                    
                                    <div className="text-center">
                                        {selectedLifeImg && <div className="relative mb-4"><img src={selectedLifeImg} className="w-full rounded-2xl border-4 border-white shadow-md max-h-60 object-cover" alt="Preview" /><button onClick={() => setSelectedLifeImg(null)} className="absolute top-2 right-2 bg-black/50 text-white w-8 h-8 rounded-full flex items-center justify-center">×</button></div>}
                                        <label className="flex items-center justify-center gap-2 w-full p-6 bg-slate-50 rounded-2xl border-4 border-dashed border-slate-100 cursor-pointer text-slate-400 font-bold hover:bg-slate-100 transition"><i className="fa-solid fa-camera text-2xl"></i> 사진 올리기(선택)<input type="file" className="hidden" accept="image/*" onChange={handleImageUpload} /></label>
                                    </div>
                                    <button onClick={() => savePost('life')} className="w-full bg-emerald-500 text-white font-bold p-5 rounded-3xl text-xl shadow-xl active:scale-95 transition mt-2">보관하기 📮</button>
                                </div>
                            </div>
                        )}

                        {activeTab === 'secret' && (
                            <div className="bg-pink-50 p-8 rounded-[2rem] border-4 border-white shadow-md animate-pop">
                                <h3 className="text-3xl font-bold mb-4 text-slate-800 font-gaegu text-center text-pink-500 italic">📮 마음 우체통</h3>
                                {appUser.role === 'admin' ? (
                                    <div className="space-y-4 mb-6 max-h-[50vh] overflow-y-auto pr-2 custom-scrollbar">
                                        <h4 className="text-sm font-bold text-pink-400 text-center mb-4 uppercase tracking-widest">전체 학생 메시지 수신함</h4>
                                        {allSecrets.length === 0 ? <div className="text-center py-10 text-pink-200 italic font-gaegu">도착한 메시지가 없어요.</div> : allSecrets.map(s => (
                                            <div key={s.id} className="bg-white p-4 rounded-2xl border-2 border-pink-100 shadow-sm transition hover:border-pink-300">
                                                <div className="flex justify-between mb-1">
                                                    <span className="text-[10px] font-bold text-pink-500 bg-pink-50 px-2 py-0.5 rounded-full">{s.writerNo}번 {s.writer}</span>
                                                    <span className="text-[8px] text-slate-300">{s.date}</span>
                                                </div>
                                                <p className="text-sm text-slate-700 font-medium mb-3">{s.content}</p>
                                                {s.reply ? (
                                                    <div className="bg-indigo-50 p-2 rounded-xl text-[11px] text-indigo-600 border border-indigo-100 italic">
                                                        <i className="fa-solid fa-reply mr-2"></i> {s.reply}
                                                    </div>
                                                ) : (
                                                    <button onClick={() => sendReply(s)} className="text-[10px] font-bold text-indigo-500 underline">답장하기</button>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                ) : (
                                    <>
                                        <p className="text-center text-pink-300 text-[11px] font-bold uppercase mb-6 tracking-widest leading-relaxed">선생님만 읽을 수 있는 비밀 편지예요.<br />고민이나 나누고 싶은 말을 적어주세요.</p>
                                        <div className="space-y-4 mb-6 max-h-64 overflow-y-auto pr-2 custom-scrollbar">
                                            {secrets.length === 0 ? <div className="text-center py-10 text-pink-200 italic font-gaegu text-xl">첫 편지를 기다리고 있어요!</div> : secrets.map(s => (
                                                <div key={s.id} className="mb-4">
                                                    <div className="flex justify-end mb-1"><div className="bg-pink-500 text-white p-4 rounded-2xl rounded-tr-none text-sm shadow-md leading-relaxed">{s.content}<p className="text-[8px] opacity-60 mt-2 text-right font-bold uppercase tracking-widest">{s.date}</p></div></div>
                                                    {s.reply && (
                                                        <div className="flex justify-start animate-pop">
                                                            <div className="bg-white border-2 border-indigo-100 text-indigo-600 p-3 rounded-2xl rounded-tl-none text-[12px] shadow-sm max-w-[85%] font-medium">
                                                                <i className="fa-solid fa-comment-dots mr-2"></i>{s.reply}
                                                                <p className="text-[8px] opacity-60 mt-1">선생님의 답장</p>
                                                            </div>
                                                        </div>
                                                    )}
                                                </div>
                                            ))}
                                        </div>
                                        <textarea id="secret-content" placeholder="선생님께 드릴 말씀이 있어요..." className="w-full p-4 bg-white rounded-2xl h-32 outline-none border-2 border-pink-200 text-sm shadow-inner"></textarea>
                                        <button onClick={sendSecret} className="w-full bg-pink-500 text-white font-bold p-4 rounded-2xl mt-4 active:scale-95 transition shadow-lg font-gaegu text-xl">보내기 💌</button>
                                    </>
                                )}
                            </div>
                        )}

                        {activeTab === 'admin' && (
                            <div className="space-y-6 animate-pop">
                                <div className="bg-white rounded-[2rem] p-8 shadow-sm border-4 border-white">
                                    <h3 className="text-xl font-bold text-slate-800 font-gaegu mb-4"><i className="fa-solid fa-calendar-days text-indigo-400 mr-2"></i>독서 마일리지 {appUser.role === 'admin' ? '(선생님용)' : '달력'}</h3>
                                    {appUser.role === 'admin' ? (
                                        <div className="space-y-4">
                                            <h4 className="text-sm font-bold text-slate-400 mb-2">🏆 작가별 독서 활동 통계</h4>
                                            <div className="grid grid-cols-1 gap-2 max-h-60 overflow-y-auto custom-scrollbar">
                                                {Object.entries(posts.reduce((acc, p) => { 
                                                    if (p.type === 'book') acc[p.writer] = (acc[p.writer] || 0) + 1; 
                                                    return acc; 
                                                }, {})).sort((a,b)=>b[1]-a[1]).map(([name, count]) => (
                                                    <div key={name} className="flex justify-between items-center p-3 bg-slate-50 rounded-xl border border-slate-100">
                                                        <span className="font-bold text-slate-700">{name} 작가</span>
                                                        <span className="bg-indigo-600 text-white text-[10px] px-3 py-1 rounded-full font-bold">{count} 권</span>
                                                    </div>
                                                ))}
                                            </div>
                                            <div className="mt-4 p-4 bg-indigo-50 rounded-2xl border border-indigo-100 text-center">
                                                <p className="text-xs text-indigo-400 font-bold uppercase mb-1">우리 반 전체 독서량</p>
                                                <p className="text-3xl font-bold text-indigo-600 font-gaegu">{posts.filter(p=>p.type==='book').length} 권</p>
                                            </div>
                                        </div>
                                    ) : (
                                        <>
                                            <div className="grid grid-cols-7 gap-2 text-center text-[10px] font-bold text-slate-300 mb-2 italic"><div>SUN</div><div>MON</div><div>TUE</div><div>WED</div><div>THU</div><div>FRI</div><div>SAT</div></div>
                                            <div className="grid grid-cols-7 gap-1">{renderCalendar()}</div>
                                        </>
                                    )}
                                </div>
                                
                                <div className="bg-white rounded-[2rem] p-8 shadow-sm border-4 border-white">
                                    <h3 className="text-xl font-bold text-slate-800 font-gaegu mb-4"><i className="fa-solid fa-user-pen text-indigo-400 mr-2"></i>프로필 관리</h3>
                                    <div className="flex flex-col items-center gap-4">
                                        <div className="relative group">
                                            <div className="w-24 h-24 rounded-3xl bg-slate-100 border-4 border-white shadow-md overflow-hidden flex items-center justify-center text-slate-300 text-3xl">
                                                {appUser.profileImg ? <img src={appUser.profileImg} className="w-full h-full object-cover" /> : <i className="fa-solid fa-user"></i>}
                                            </div>
                                            <label className="absolute bottom-[-10px] right-[-10px] bg-indigo-600 text-white w-8 h-8 rounded-full flex items-center justify-center cursor-pointer shadow-lg hover:bg-indigo-700 transition">
                                                <i className="fa-solid fa-camera text-xs"></i>
                                                <input type="file" className="hidden" accept="image/*" onChange={handleProfileUpload} />
                                            </label>
                                        </div>
                                        <p className="text-xs text-slate-400 font-bold uppercase">사진을 눌러 변경하세요</p>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>

                    <nav className="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-xl shadow-[0_-15px_40px_rgba(0,0,0,0.1)] rounded-t-[3rem] px-4 pt-5 pb-8 flex justify-between items-center z-[4000] border-t-4 border-white">
                        <button onClick={() => setActiveTab('feed')} className={`flex flex-col items-center gap-1 transition-all flex-1 ${activeTab === 'feed' ? 'nav-item active' : 'nav-item'}`}>
                            <i className="fa-solid fa-house-chimney text-2xl"></i><span className="nav-text">홈</span>
                        </button>
                        <button onClick={() => setActiveTab('write-book')} className={`flex flex-col items-center gap-1 transition-all flex-1 ${activeTab === 'write-book' ? 'nav-item active' : 'nav-item'}`}>
                            <i className="fa-solid fa-book-open-reader text-2xl"></i><span className="nav-text">독서기록</span>
                        </button>
                        <button onClick={() => setActiveTab('write-life')} className={`flex flex-col items-center gap-1 transition-all flex-1 ${activeTab === 'write-life' ? 'nav-item active' : 'nav-item'}`}>
                            <i className="fa-solid fa-pen-fancy text-2xl"></i><span className="nav-text">조각</span>
                        </button>
                        <button onClick={() => setActiveTab('secret')} className={`flex flex-col items-center gap-1 transition-all flex-1 ${activeTab === 'secret' ? 'nav-item active' : 'nav-item'}`}>
                            <i className="fa-solid fa-envelope-heart text-2xl"></i><span className="nav-text">우체통</span>
                        </button>
                        <button onClick={() => setActiveTab('admin')} className={`flex flex-col items-center gap-1 transition-all flex-1 ${activeTab === 'admin' ? 'nav-item active' : 'nav-item'}`}>
                            <i className="fa-solid fa-star-of-life text-2xl"></i><span className="nav-text">관리</span>
                        </button>
                    </nav>

                    {/* 좋아요 명단 모달 */}
                    {showLikes && (
                        <div className="fixed inset-0 bg-black/60 z-[5000] flex items-center justify-center p-6 backdrop-blur-sm" onClick={()=>setShowLikes(null)}>
                            <div className="bg-white rounded-[2.5rem] p-8 w-full max-w-xs animate-pop shadow-2xl border-4 border-white" onClick={e=>e.stopPropagation()}>
                                <h4 className="font-bold text-center mb-6 font-gaegu text-2xl text-pink-500">누가 응원했나요? ❤️</h4>
                                <div className="space-y-2 max-h-60 overflow-y-auto custom-scrollbar pr-2">
                                    {showLikes.map((l, i) => (
                                        <div key={i} className="flex items-center gap-2 p-2 bg-pink-50 rounded-xl">
                                            <i className="fa-solid fa-heart text-pink-400 text-[10px]"></i>
                                            <span className="text-sm font-bold text-pink-600">{l.name} 작가님</span>
                                        </div>
                                    ))}
                                </div>
                                <button onClick={()=>setShowLikes(null)} className="w-full mt-6 bg-slate-100 p-3 rounded-2xl font-bold text-slate-400 text-sm">닫기</button>
                            </div>
                        </div>
                    )}

                    {/* 댓글 모달 */}
                    {showComments && (
                        <div className="fixed inset-0 bg-black/60 z-[5000] flex flex-col justify-end backdrop-blur-sm">
                            <div className="bg-white rounded-t-[3rem] p-8 w-full max-w-xl mx-auto border-t-8 border-indigo-400 shadow-2xl">
                                <div className="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-8"></div>
                                <h4 className="font-bold text-center mb-8 font-gaegu text-3xl text-indigo-600 italic">응원 댓글 💬</h4>
                                <div className="space-y-4 max-h-[40vh] overflow-y-auto mb-24 px-2 custom-scrollbar">
                                    {showComments.comments.length === 0 ? <p className="text-center py-10 text-slate-300 italic font-gaegu text-xl">첫 댓글을 달아보세요!</p> : showComments.comments.map((c, i) => (
                                        <div key={i} className="bg-slate-50 p-4 rounded-2xl border-2 border-white flex flex-col animate-pop">
                                            <div className="flex justify-between mb-1">
                                                <span className="text-[10px] font-bold text-indigo-500 uppercase tracking-widest">{c.writer} 작가님</span>
                                                <span className="text-[8px] text-slate-300">{new Date(c.timestamp).toLocaleTimeString()}</span>
                                            </div>
                                            <p className="text-sm text-slate-700 font-medium">{c.content}</p>
                                        </div>
                                    ))}
                                </div>
                                <div className="absolute bottom-0 left-0 right-0 p-6 bg-white border-t flex gap-2 rounded-t-[2rem]">
                                    <input value={commentInput} onChange={(e) => setCommentInput(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && addComment()} placeholder="응원의 한마디를 입력하세요" className="flex-1 p-4 bg-slate-50 rounded-2xl outline-none font-medium shadow-inner" />
                                    <button onClick={addComment} className="bg-indigo-600 text-white px-8 rounded-2xl font-bold shadow-lg">보내기</button>
                                </div>
                                <button onClick={() => setShowComments(null)} className="absolute top-8 right-8 text-slate-300 text-3xl hover:text-indigo-600">×</button>
                            </div>
                        </div>
                    )}

                    {alert.show && (
                        <div className="fixed inset-0 bg-black/40 z-[6000] flex items-center justify-center p-6 backdrop-blur-md">
                            <div className="bg-white p-10 rounded-[3.5rem] text-center w-full max-w-xs shadow-2xl border-b-8 border-indigo-500 animate-pop">
                                <div className="text-7xl mb-6 drop-shadow-lg">{alert.icon}</div><p className="font-bold text-slate-800 text-2xl mb-10 leading-tight font-gaegu">{alert.msg}</p>
                                <button onClick={() => setAlert({ ...alert, show: false })} className="w-full bg-indigo-600 text-white p-5 rounded-3xl font-bold text-xl active:scale-95 shadow-lg">확인</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
